name: Release

# Builds the Go binary, packages .deb for all supported architectures, attaches
# per-arch binaries to a GitHub Release, and publishes the .debs to the APT repo.
# COPR (Fedora RPM) builds are handled in .github/workflows/copr.yml.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build .deb packages for multiple architectures. The binary is a static
  # CGO-free build, so the Go internal linker cross-compiles to every arch with
  # no C toolchain; debian/rules maps DEB_HOST_ARCH to the right GOARCH.
  build-debs:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, armhf, riscv64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dpkg-dev

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b -a ${{ matrix.arch }} -d

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../teleddns_*_${{ matrix.arch }}.deb dist/
          cp teleddns dist/teleddns-${{ matrix.arch }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: dist/teleddns-${{ matrix.arch }}

  # Create GitHub Release with the per-arch binaries.
  github-release:
    name: Create GitHub Release
    needs: build-debs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            teleddns-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to the APT repository (Debian trixie + Ubuntu noble).
  publish-apt:
    name: Publish to APT repo
    needs: build-debs
    runs-on: ubuntu-latest
    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true

      - name: Upload and publish to APT repo
        env:
          SSH_KEY: ${{ secrets.APT_SSH_KEY }}
          SSH_HOST: ${{ secrets.APT_SSH_HOST }}
          SSH_USER: ${{ secrets.APT_SSH_USER }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts

          # Upload and add each .deb file to the repository
          for deb in *.deb; do
            echo "Processing $deb..."
            scp "$deb" "${SSH_USER}@${SSH_HOST}:/tmp/"
            ssh "${SSH_USER}@${SSH_HOST}" "cd /srv/apt/www/teleddns && reprepro includedeb trixie /tmp/$deb && reprepro includedeb noble /tmp/$deb && rm /tmp/$deb"
          done
