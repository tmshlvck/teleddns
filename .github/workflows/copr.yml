name: Build in COPR

# Builds the RPM (from teleddns.spec, which now builds the Go binary) in COPR
# for Fedora 43/44/rawhide on x86_64 and aarch64.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  publish-copr:
    name: Build in COPR
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install copr-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install copr-cli

      - name: Configure copr-cli
        # COPR_TOKEN holds the full ~/.config/copr file downloaded from the COPR
        # API page (it already contains [copr-cli], login, username, token and
        # copr_url), so write it out verbatim. Passed via env to handle the
        # multi-line value safely.
        env:
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '%s\n' "$COPR_TOKEN" > ~/.config/copr

      - name: Submit COPR build
        run: |
          # Submit build using spec file URL - COPR downloads sources and builds with network
          SPEC_URL="https://raw.githubusercontent.com/tmshlvck/teleddns/${{ steps.tag.outputs.tag }}/teleddns.spec"
          copr-cli build tmshlvck/teleddns --nowait \
            -r fedora-43-x86_64 \
            -r fedora-43-aarch64 \
            -r fedora-44-x86_64 \
            -r fedora-44-aarch64 \
            -r fedora-rawhide-x86_64 \
            -r fedora-rawhide-aarch64 \
            "$SPEC_URL"
